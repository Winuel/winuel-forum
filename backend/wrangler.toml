name = "cloudlink-backend"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"
# 注意：JWT_SECRET 应该使用 secrets 而不是 vars
# 使用命令: wrangler secret put JWT_SECRET

[[d1_databases]]
binding = "DB"
database_name = "cloudlink-db"
database_id = "8ede8043-e500-4893-a93d-58c2d1048f1a"

# R2 需要在 Cloudflare Dashboard 中启用
# [[r2_buckets]]
# binding = "R2"
# bucket_name = "cloudlink-bucket"

[[kv_namespaces]]
binding = "KV"
id = "6c15505889704c9f9f9e148394b6f0ec"
preview_id = "96179db79b6d4b5b9c0b899977a2c942"