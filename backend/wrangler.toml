name = "winuel-backend"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"
# CORS 允许的源（逗号分隔）
# 例如: CORS_ORIGINS = "https://www.winuel.com,https://winuel.pages.dev,https://admin.winuel.com,https://64229809.winuel-admin.pages.dev,https://winuel-admin.pages.dev"
# 注意：JWT_SECRET、RESEND_API_KEY、GITHUB_CLIENT_ID、GITHUB_CLIENT_SECRET 应该使用 secrets 而不是 vars
# 使用命令: wrangler secret put JWT_SECRET
# 使用命令: wrangler secret put RESEND_API_KEY
# 使用命令: wrangler secret put GITHUB_CLIENT_ID
# 使用命令: wrangler secret put GITHUB_CLIENT_SECRET
# 邮件发送配置
RESEND_FROM_EMAIL = "noreply@mail.winuel.com"
RESEND_FROM_NAME = "云纽论坛"
# API基础URL（用于OAuth回调）
API_URL = "https://api.winuel.com"

[[d1_databases]]
binding = "DB"
database_name = "winuel-db"
database_id = "8ede8043-e500-4893-a93d-58c2d1048f1a"

# R2 需要在 Cloudflare Dashboard 中启用
# [[r2_buckets]]
# binding = "R2"
# bucket_name = "winuel-bucket"

[[kv_namespaces]]
binding = "KV"
id = "6c15505889704c9f9f9e148394b6f0ec"
preview_id = "96179db79b6d4b5b9c0b899977a2c942"

# 自定义域名配置
[[routes]]
pattern = "api.winuel.com/*"
zone_name = "winuel.com"